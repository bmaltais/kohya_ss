# Files for typos
# Instruction:  https://github.com/marketplace/actions/typos-action#getting-started

[default.extend-identifiers]

[default.extend-words]
NIN="NIN"
parms="parms"
nin="nin"
extention="extention" # Intentionally left
nd="nd"
pn="pn"
shs="shs"
sts="sts"
scs="scs"
cpc="cpc"
coc="coc"
cic="cic"
msm="msm"
usu="usu"
ici="ici"
lvl="lvl"
dii="dii"
muk="muk"
ori="ori"
hru="hru"
rik="rik"
koo="koo"
yos="yos"
wn="wn"
parm = "parm"
byt = "byt" # byT5 text encoder (HunyuanImage-2.1)


[files]
extend-exclude = [
    "_typos.toml",
    "venv",
    # Vendored minified third-party; short identifiers trip false positives.
    "assets/js/iframeResizer.contentWindow.min.js",
]
